name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: |
          ruff check download_fema_flood_rasters.py --select E9,F63,F7,F82

      - name: Smoke Dry-Run
        run: |
          python download_fema_flood_rasters.py --states RI --dry-run --output-dir ci_output
